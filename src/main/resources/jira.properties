# Basic URL of Apache JIRA Server/Data Center (without a final slash)
jira.url=https://issues.apache.org/jira

# Personal Access Token (PAT) authentication
# Provide it via one of:
# 1. config/jira.local.properties (ignored by Git)
# 2. -Dmantimetrics.jira.pat=...
# 3. MANTIMETRICS_JIRA_PAT
jira.pat=

# JQL to extract only fixed bugs
jira.query=project = {projectKey} AND issuetype = Bug AND status in (Closed, Resolved) AND resolution = Fixed
